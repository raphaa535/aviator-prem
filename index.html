<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Predictor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Barre icône -->
    <div class="top-bar">
        <h1>✈AVIATOR✈</h1>
        <div class="top-icons">
            <button id="toggleHistory" title="Afficher/Cacher Historique">📜</button>
        </div>
    </div>

    <!-- Card prédiction -->
    <div class="card">
        <div class="input-group">
            <label for="time">🕒 Heure</label>
            <input type="text" id="time" placeholder="ex: 14:25:30">
        </div>

        <div class="input-group">
            <label for="seed">☣️ Seed client</label>
            <input type="text" id="seed" placeholder="ex: 25ae">
        </div>

        <div class="input-group">
            <label for="multi">🎯 Multiplicateur</label>
            <input type="number" id="multi" placeholder="ex: 2.5" step="0.01">
        </div>

        <button id="predictBtn">Calculer</button>
    </div>

    <!-- Card résultats modernes -->
    <div class="card results" id="resultsCard">
        <h2>⏱Résultats⏱</h2>

        <div class="result-item">
            <span class="time final" id="time1"></span>
            <span class="multi blizzard" id="blizzard1"></span>
        </div>

        <div class="result-item" id="orig2" style="display:none;">
            <span class="time final" id="time2"></span>
            <span class="multi safe" id="safe1"></span>
        </div>

        <div class="result-item" id="orig3" style="display:none;">
            <span class="time final" id="time3"></span>
            <span class="multi mid" id="mid1"></span>
        </div>

        <div class="result-item" id="orig4" style="display:none;">
            <span class="time final" id="time4"></span>
            <span class="multi big" id="big1"></span>
        </div>
    </div>

    <!-- Historique moderne -->
    <div class="card" id="historyCard">
        <div class="history-header">
            <h2>📜Historique</h2>
            <button id="clearHistory" title="Effacer Historique">🗑</button>
        </div>
        <div id="historyList"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
